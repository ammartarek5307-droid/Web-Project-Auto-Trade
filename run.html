<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Launching AutoTrade...</title>
  <meta http-equiv="refresh" content="0; url=AutoTrade-Flat/index.html">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%);
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: white;
    }
    .launcher {
      text-align: center;
      padding: 3rem 4rem;
    }
    .logo {
      font-size: 2.8rem;
      font-weight: 800;
      background: linear-gradient(90deg, #38bdf8, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 1rem;
    }
    p {
      color: rgba(255,255,255,0.5);
      font-size: 1rem;
      margin-bottom: 2rem;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(56,189,248,0.2);
      border-top-color: #38bdf8;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1.5rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    a {
      color: #38bdf8;
      text-decoration: none;
      font-size: 0.9rem;
    }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="launcher">
    <div class="logo">AutoTrade</div>
    <div class="spinner"></div>
    <p>Opening AutoTrade...</p>
    <a href="AutoTrade-Flat/index.html">Click here if not redirected</a>
  </div>
  <script>
    // Redirect immediately
    window.location.replace("AutoTrade-Flat/index.html");
  </script>
</body>
</html>
