<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Favorites | AutoTrade</title>
  <meta name="description" content="View your saved favorite cars on AutoTrade.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="cars.css">
  <script src="data.js" defer></script>
  <script src="main.js" defer></script>
  <script src="cars.js" defer></script>
</head>
<body>

  <!-- Navigation -->
  <header style="position:sticky;">
    <div class="container nav-container">
      <a href="index.html" class="logo">Auto<span>Trade</span></a>
      <button class="menu-toggle" id="mobile-menu-toggle" aria-label="Toggle menu" aria-expanded="false">☰</button>
      <nav class="nav-links" id="nav-links">
        <a href="index.html">Home</a>
        <a href="categories.html?type=all">Browse Cars</a>
        <a href="favorites.html" class="active">Favorites</a>
        <a href="sell.html" class="nav-sell-btn">Sell My Car</a>
      </nav>
      <a href="admin-login.html" class="admin-access-btn" title="Admin Panel">
        <span>⚙</span><span>Admin</span>
      </a>
    </div>
  </header>

  <!-- Page Hero -->
  <div class="page-hero" style="margin-top:0;">
    <div class="container">
      <h1>My Favorites</h1>
      <p id="favorites-count">Loading...</p>
    </div>
  </div>

  <!-- Main Content -->
  <main class="container favorites-layout">

    <!-- Empty State -->
    <div id="favorites-empty" style="display:none;">
      <div class="empty-state">
        <div class="empty-state-icon">Empty</div>
        <h3>No favorite cars yet</h3>
        <p>Save the cars you like by clicking the heart icon. They will appear here.</p>
        <a href="categories.html?type=all" class="btn btn-primary btn-lg" id="go-browse-btn">Browse Cars</a>
      </div>
    </div>

    <!-- Favorites Grid -->
    <div class="grid" id="favorites-grid">
      <!-- Injected by cars.js -->
    </div>

  </main>

  <!-- Footer -->
  <footer>
    <div class="container">
      <div class="footer-bottom" style="border:none; padding:0;">
        <p>© 2026 AutoTrade. All rights reserved.</p>
        <div class="footer-links">
          <a href="categories.html?type=all">Browse All Cars</a>
        </div>
      </div>
    </div>
  </footer>

</body>
</html>
