version: '3.8'

services:
  backend:
    build: .
    ports:
      - "3000:3000"
      - "8443:8443"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HTTPS_PORT=8443
      - MONGO_URI=mongodb://mongo:27017/autotrade
      - JWT_SECRET=super_secret_jwt_key_for_prod
      - SESSION_SECRET=super_secret_session_key_for_prod
    depends_on:
      - mongo

  mongo:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
