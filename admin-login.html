<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | AutoTrade</title>
  <meta name="description" content="AutoTrade — Admin Login Portal">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="admin.css">
  <script src="data.js" defer></script>
  <script src="main.js" defer></script>
  <script src="admin.js" defer></script>
</head>
<body>

  <div class="admin-login-page">
    <div class="login-card">

      <div class="login-logo">Auto<span style="color:var(--color-accent);">Trade</span></div>
      <h2>Admin Portal</h2>
      <p class="login-subtitle">Sign in to access the dashboard</p>

      <!-- Error Alert -->
      <div class="login-alert" id="login-alert" role="alert">
        <span>⚠️</span>
        <span>Incorrect username or password. Please try again.</span>
      </div>

      <!-- Login Form -->
      <form id="admin-login-form" novalidate>

        <div class="form-group" style="margin-bottom:1.2rem;">
          <label for="admin-username">Username</label>
          <input
            type="text"
            id="admin-username"
            class="form-control"
            placeholder="Enter username"
            autocomplete="username"
            required
          >
        </div>

        <div class="form-group" style="margin-bottom:1.6rem;">
          <label for="admin-password">Password</label>
          <div class="password-wrapper">
            <input
              type="password"
              id="admin-password"
              class="form-control"
              placeholder="Enter password"
              autocomplete="current-password"
              required
            >
            <button type="button" class="show-pass-btn" id="show-pass-btn" aria-label="Show/Hide password">
              Show
            </button>
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-lg w-full" id="login-submit-btn">
          Login
        </button>

      </form>

      <div class="login-footer">
        <a href="index.html" style="color:var(--color-sky-blue);">← Back to AutoTrade</a>
      </div>

    </div>
  </div>

</body>
</html>
