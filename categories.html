<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browse Cars | AutoTrade</title>
  <meta name="description" content="Browse all cars on AutoTrade — SUV, Sedan, Hatchback at the best prices in Egypt.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="cars.css">
  <script src="data.js" defer></script>
  <script src="main.js" defer></script>
  <script src="cars.js" defer></script>
</head>

<body>

  <!-- Navigation -->
  <header style="position:sticky;">
    <div class="container nav-container">
      <a href="index.html" class="logo">Auto<span>Trade</span></a>
      <button class="menu-toggle" id="mobile-menu-toggle" aria-label="Toggle menu" aria-expanded="false">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <nav class="nav-links" id="nav-links">
        <a href="index.html">Home</a>
        <a href="categories.html?type=all" class="active">Browse Cars</a>
        <a href="favorites.html">Favorites</a>
        <a href="sell.html" class="nav-sell-btn">Sell My Car</a>
      </nav>
      <a href="admin-login.html" class="admin-access-btn" id="admin-access-btn" title="Admin Panel">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        <span>Admin</span>
      </a>
    </div>
  </header>

  <!-- Page Hero -->
  <div class="page-hero" style="margin-top:0;">
    <div class="container">
      <h1 id="category-title">All Cars</h1>
      <p id="category-subtitle">Browse all inventory</p>
    </div>
  </div>

  <!-- Top Categories — full width -->
  <div class="categories-top-bar">
    <div class="categories-full-row">
      <a href="categories.html?type=all" id="filter-all" class="cat-pill active">All Cars</a>
      <a href="categories.html?type=suv" id="filter-suv" class="cat-pill">SUV</a>
      <a href="categories.html?type=sedan" id="filter-sedan" class="cat-pill">Sedan</a>
      <a href="categories.html?type=hatchback" id="filter-hatchback" class="cat-pill">Hatchback</a>
    </div>
  </div>

  <!-- Search Panel Overlay -->
  <div class="search-panel-overlay" id="search-panel-overlay"></div>

  <!-- Slide-in Search Panel -->
  <aside class="search-panel" id="search-panel" aria-label="Search and filter panel">
    <div class="search-panel-header">
      <span class="search-panel-title">Refine Search</span>
      <button class="search-panel-close" id="search-panel-close" aria-label="Close filters">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <div class="search-panel-body">
      <!-- Keywords -->
      <div class="sidebar-filter-group">
        <label for="search-name">Search</label>
        <div class="filter-input-wrap">
          <svg class="filter-input-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="search-name" class="form-control filter-input-padded" placeholder="Make, model, keyword..." autocomplete="off">
        </div>
      </div>

      <!-- Price Range -->
      <div class="sidebar-filter-group">
        <label>Price Range</label>
        <div class="price-range-inputs">
          <input type="number" id="search-price-min" class="form-control" placeholder="Min" autocomplete="off">
          <span class="sep">—</span>
          <input type="number" id="search-price-max" class="form-control" placeholder="Max" autocomplete="off">
        </div>
        <button class="btn btn-outline w-full apply-btn" id="apply-price-btn">Apply</button>
      </div>

      <!-- Color -->
      <div class="sidebar-filter-group">
        <label for="search-color">Color</label>
        <div class="filter-input-wrap">
          <svg class="filter-input-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
          <input type="text" id="search-color" class="form-control filter-input-padded" placeholder="e.g. White, Black" autocomplete="off">
        </div>
      </div>

      <!-- Year -->
      <div class="sidebar-filter-group">
        <label for="search-year">Year</label>
        <input type="number" id="search-year" class="form-control" placeholder="e.g. 2021" min="1990" max="2026" autocomplete="off">
      </div>

      <button class="search-clear-btn w-full" id="search-clear-btn">Clear All Filters</button>

      <hr class="sidebar-divider">
      <a href="sell.html" class="btn btn-primary w-full" style="font-size:.82rem;" id="sidebar-sell-btn">Post Your Ad</a>
    </div>
  </aside>

  <!-- Main Layout -->
  <main class="container">
    <div class="browse-layout">

      <!-- Sort & Result Count bar (full width, above grid) -->
      <div class="sort-bar-wrap">
        <div class="results-info">
          <p class="search-result-count" id="search-result-count"></p>
          <div id="price-range-display" class="price-range-display"></div>
        </div>
        <div class="sort-bar-right">
          <!-- Filter toggle button -->
          <button class="filter-toggle-btn" id="filter-toggle-btn" aria-expanded="false" aria-controls="search-panel">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="11" y1="18" x2="13" y2="18"/></svg>
            Filters
            <span class="filter-active-dot" id="filter-active-dot"></span>
          </button>
          <div class="sort-controls">
            <span class="sort-label">Sort by</span>
            <select class="sort-select" id="sort-select">
              <option value="default">Default</option>
              <option value="price-asc">Price: Low to High</option>
              <option value="price-desc">Price: High to Low</option>
              <option value="year-desc">Year: Newest First</option>
              <option value="year-asc">Year: Oldest First</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Car Grid -->
      <div class="grid" id="category-cars-grid">
        <!-- Injected by cars.js -->
      </div>

    </div>
  </main>

  <!-- Footer -->
  <footer>
    <div class="container">
      <div class="footer-bottom" style="border:none; padding:0;">
        <p>© 2026 AutoTrade. All rights reserved.</p>
        <div class="footer-links">
          <a href="index.html">Home</a>
          <a href="sell.html">Sell</a>
          <a href="favorites.html">Favorites</a>
        </div>
      </div>
    </div>
  </footer>

</body>

</html>
